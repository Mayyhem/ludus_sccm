---
# There is an issue with ODBC Driver 18.6.1 and later on Windows where it
# causes SQL Server connections to fail during setup of the site database.
# https://www.ahmetkurt.com.tr/error-received-while-installing-sccm-version-24032509-error-code-cannot-insert-the-value-null-into-column-and-lu_licensedproduct/

- name: Check installed ODBC Driver 18 version
  ansible.windows.win_shell: |
    $product = Get-WmiObject Win32_Product | Where-Object { $_.Name -like '*ODBC*18*' }
    if ($product) { $product.Version } else { 'not installed' }
  register: odbc_version
  changed_when: false

- name: Display current ODBC version
  ansible.builtin.debug:
    msg: "Current ODBC Driver 18 version: {{ odbc_version.stdout | trim }}"

- name: Uninstall current ODBC Driver 18
  ansible.windows.win_shell: |
    $product = Get-WmiObject Win32_Product | Where-Object { $_.Name -like '*ODBC*18*' }
    $product.Uninstall()
  when: odbc_version.stdout | trim != 'not installed' and not odbc_version.stdout | trim is search('18\.5\.2')

- name: Create temp directory
  ansible.windows.win_file:
    path: C:\temp
    state: directory
  when: not odbc_version.stdout | trim is search('18\.5\.2')

- name: Download ODBC Driver 18.5.2
  ansible.windows.win_get_url:
    url: https://go.microsoft.com/fwlink/?linkid=2335671
    dest: C:\temp\msodbcsql_18.5.2.msi
    follow_redirects: all
  when: not odbc_version.stdout | trim is search('18\.5\.2')

- name: Download Visual C++ 2017 Redistributable
  ansible.windows.win_get_url:
    url: https://aka.ms/vs/15/release/vc_redist.x64.exe
    dest: C:\temp\vc_redist.x64.exe
  when: not odbc_version.stdout | trim is search('18\.5\.2')

- name: Install Visual C++ 2017 Redistributable
  ansible.windows.win_package:
    path: C:\temp\vc_redist.x64.exe
    state: present
    arguments: '/install /quiet /norestart'
    expected_return_code: [0, 1638, 3010]
  when: not odbc_version.stdout | trim is search('18\.5\.2')

- name: Install ODBC Driver 18.5.2
  ansible.windows.win_package:
    path: C:\temp\msodbcsql_18.5.2.msi
    state: present
    arguments: 'IACCEPTMSODBCSQLLICENSETERMS=YES /quiet /norestart'
  when: not odbc_version.stdout | trim is search('18\.5\.2')

- name: Reboot after ODBC driver change
  ansible.windows.win_reboot:
  when: not odbc_version.stdout | trim is search('18\.5\.2')